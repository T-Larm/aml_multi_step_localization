dataset_name: error
train_split: ['training']
val_split: ['training', 'validation', 'test']
dataset: {
  json_file: ./captaincook_actionformer_annotations/combined/split.json,
  feat_folder: ./egovlp,
  file_prefix: ~,
  file_ext: _360p_224.mp4_1s_1s.npz,
  num_classes: 353,
  input_dim: 256,
  feat_stride: 1,
  num_frames: 1,
  default_fps: 1,
  trunc_thresh: 0.3,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 2048,
}
model: {
  input_dim: 256,
  backbone_arch: [2, 2, 7],
  regression_range: [[0,4],[2,8],[4,16],[8,32],[16,64],[32,128],[64,256],[128,10000]],
  fpn_type: identity,
  max_buffer_len_factor: 6.0,
  n_mha_win_size: 9,
}
opt: {
  learning_rate: 0.0001,
  epochs: 100,
  weight_decay: 0.05,
}
loader: {
  batch_size: 1,
  num_workers: 1,
}
train_cfg: {
  init_loss_norm: 250,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
}
test_cfg: {
  pre_nms_topk: 5000,
  max_seg_num: 50,
  min_score: 0.001,
  nms_sigma: 0.4,
  multiclass_nms: True,
  ext_score_file: ~
}
output_folder: ./ckpt/
